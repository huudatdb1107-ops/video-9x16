<!--
COMPONENT: card-grid-3-vertical
PURPOSE: 3 card stack dọc (1 cột × 3 hàng) — list 3 dấu hiệu/items có số thứ tự
PROPS:
  cards: array of {num, text}
USAGE:
  <div class="hf-card-grid hf-grid-3v">
    <div class="hf-card-num-row">
      <div class="hf-card-num">01</div>
      <div class="hf-card-text">Không thể <em class="hl-orange">ngồi yên</em> kể cả việc <em class="hl-teal">con thích</em></div>
    </div>
    ...
  </div>
GSAP:
  tl.from(".hf-grid-3v .hf-card-num-row", { x: -80, opacity: 0, duration: 0.7, stagger: 0.3, ease: "power3.out" }, t);
-->
<style>
.hf-card-grid.hf-grid-3v { grid-template-columns: 1fr; gap: 28px; max-width: 900px; }

.hf-card-num-row {
  background: rgba(10, 24, 32, 0.55);
  border: 1.5px solid rgba(58, 188, 188, 0.35);
  border-radius: 20px;
  padding: 36px 44px;
  display: flex;
  align-items: center;
  gap: 28px;
  box-shadow: 0 0 40px rgba(255, 122, 42, 0.08), inset 0 0 30px rgba(58, 188, 188, 0.06);
}
.hf-card-num-row .hf-card-num {
  font-family: "Inter", sans-serif;
  font-size: 80px;
  font-weight: 900;
  color: #ff7a2a;
  min-width: 90px;
  line-height: 1;
  text-shadow: 0 0 20px rgba(255, 122, 42, 0.5);
}
.hf-card-num-row .hf-card-text {
  font-size: 40px;
  color: #fff;
  font-weight: 600;
  line-height: 1.3;
}
.hf-card-num-row em.hl-orange { color: #ff7a2a; font-style: normal; font-weight: 700; }
.hf-card-num-row em.hl-teal   { color: #4dcccc; font-style: normal; font-weight: 700; }
</style>

<div class="hf-card-grid hf-grid-3v">
  <div class="hf-card-num-row">
    <div class="hf-card-num">01</div>
    <div class="hf-card-text">[Item 1 text — có thể chèn <em class="hl-orange">keyword cam</em>]</div>
  </div>
  <div class="hf-card-num-row">
    <div class="hf-card-num">02</div>
    <div class="hf-card-text">[Item 2 text]</div>
  </div>
  <div class="hf-card-num-row">
    <div class="hf-card-num">03</div>
    <div class="hf-card-text">[Item 3 text]</div>
  </div>
</div>
