<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Background Variants Preview</title>
<style>
body { margin: 0; background: #000; font-family: "Inter", sans-serif; padding: 20px; color: #fff; }
h1 { color: #4dcccc; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; }
.bg-card { position: relative; aspect-ratio: 9/16; max-height: 720px; overflow: hidden; border-radius: 12px; border: 2px solid #333; }
.bg-card iframe { width: 100%; height: 100%; border: none; }
.bg-label { position: absolute; top: 12px; left: 12px; z-index: 100; background: rgba(0,0,0,0.7); color: #ff7a2a; padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.bg-label code { color: #4dcccc; }
</style>
</head>
<body>

<h1>📦 Background Variants — 4 lựa chọn</h1>
<p style="color:#a0c4c4">Mỗi card show 1 background full-screen. Boss chọn cái thích → em wire vào template.</p>

<div class="grid">

  <div class="bg-card">
    <div class="bg-label">1 — WARM <code>background-warm</code></div>
    <iframe src="background-warm-demo.html"></iframe>
  </div>

  <div class="bg-card">
    <div class="bg-label">2 — TECH <code>background-tech</code></div>
    <iframe src="background-tech-demo.html"></iframe>
  </div>

  <div class="bg-card">
    <div class="bg-label">3 — MINIMAL <code>background-minimal</code></div>
    <iframe src="background-minimal-demo.html"></iframe>
  </div>

  <div class="bg-card">
    <div class="bg-label">4 — ORANGE SUNSET <code>background-gradient-orange</code></div>
    <iframe src="background-gradient-orange-demo.html"></iframe>
  </div>

</div>

</body>
</html>
