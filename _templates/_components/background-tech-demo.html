<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>BG tech</title>
<style>
body { margin: 0; background: #000; }
#root { position: relative; width: 1080px; height: 1920px; transform-origin: top left; }
@media (max-width: 1080px) { #root { transform: scale(0.4); width: 100vw; height: auto; aspect-ratio: 9/16; } }
</style></head><body>
<div id="root">
<!--
COMPONENT: background-tech
PURPOSE: Background layer cho video tech-style (vd Ente): deep navy gradient + subtle grid lines + corner spotlight
NOTE: Đặt ở root, z-index thấp nhất. Component này KHÔNG có content, chỉ là layer nền.
USAGE:
  <div class="hf-bg-tech"></div>  <!-- đầu tiên trong scene root -->
GSAP (optional):
  tl.to(".hf-bg-spotlight", { opacity: 0.7, duration: 4, ease: "sine.inOut", yoyo: true, repeat: -1 }, 0);
-->
<style>
.hf-bg-tech {
  position: absolute;
  inset: 0;
  z-index: 0;
  background: linear-gradient(180deg, #0a1828 0%, #051220 50%, #030a18 100%);
  overflow: hidden;
}
/* Grid lines pattern */
.hf-bg-tech::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(92, 182, 255, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(92, 182, 255, 0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
/* Spotlight top-left */
.hf-bg-tech::after {
  content: "";
  position: absolute;
  top: -200px;
  left: -100px;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(92, 182, 255, 0.18) 0%, rgba(92, 182, 255, 0) 60%);
  pointer-events: none;
  filter: blur(20px);
}
</style>

<div class="hf-bg-tech"></div>

<div style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;color:#fff;font-family:Inter,sans-serif;font-size:42px;font-weight:700;text-shadow:0 0 20px rgba(0,0,0,0.8)">
Sample text on background
</div>
</div></body></html>
