<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>BG gradient-orange</title>
<style>
body { margin: 0; background: #000; }
#root { position: relative; width: 1080px; height: 1920px; transform-origin: top left; }
@media (max-width: 1080px) { #root { transform: scale(0.4); width: 100vw; height: auto; aspect-ratio: 9/16; } }
</style></head><body>
<div id="root">
<!--
COMPONENT: background-gradient-orange
PURPOSE: Background ấm rực — gradient cam vàng nâu, phù hợp branding B.SIMPLE / năng lượng / sáng tạo
USAGE: Đặt đầu body, z-index 0
PALETTE: warm-sunset
-->
<style>
#bg-orange-root {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(circle at 20% 80%, rgba(255, 138, 58, 0.35) 0%, transparent 55%),
    radial-gradient(circle at 80% 20%, rgba(255, 122, 42, 0.25) 0%, transparent 50%),
    linear-gradient(135deg, #2a1208 0%, #1a0a04 50%, #0a0502 100%);
}
#bg-orange-root::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    radial-gradient(rgba(255, 200, 100, 0.04) 1px, transparent 1px);
  background-size: 24px 24px;
}
</style>

<div id="bg-orange-root"></div>

<div style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;color:#fff;font-family:Inter,sans-serif;font-size:42px;font-weight:700;text-shadow:0 0 20px rgba(0,0,0,0.8)">
Sample text on background
</div>
</div></body></html>
