<!--
COMPONENT: frame-chrome
PURPOSE: 4 góc brackets viewfinder + footer label uppercase — "chrome" bao quanh mỗi scene (vd video Ente)
PROPS:
  footer_label (optional): text uppercase letter-spacing rộng, đặt góc dưới-phải
USAGE:
  <div class="hf-frame">
    <div class="hf-bracket tl"></div>
    <div class="hf-bracket tr"></div>
    <div class="hf-bracket bl"></div>
    <div class="hf-bracket br"></div>
    <div class="hf-footer-label">ENTE / PRIVACY FIRST PHOTOS</div>
  </div>
NOTE: Đặt component này ở root scene (position: absolute, inset 0). Brackets không animate, footer có thể fade in cuối scene.
GSAP (optional):
  tl.from(".hf-frame .hf-bracket", { opacity: 0, duration: 0.5, stagger: 0.05 }, 0);
  tl.from(".hf-footer-label", { opacity: 0, duration: 0.5 }, 0.5);
-->
<style>
.hf-frame {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}
.hf-bracket {
  position: absolute;
  width: 60px;
  height: 60px;
  border-color: rgba(255, 255, 255, 0.5);
  border-style: solid;
  border-width: 0;
}
.hf-bracket.tl { top: 30px;    left: 30px;    border-top-width: 2px;    border-left-width: 2px; }
.hf-bracket.tr { top: 30px;    right: 30px;   border-top-width: 2px;    border-right-width: 2px; }
.hf-bracket.bl { bottom: 30px; left: 30px;    border-bottom-width: 2px; border-left-width: 2px; }
.hf-bracket.br { bottom: 30px; right: 30px;   border-bottom-width: 2px; border-right-width: 2px; }

.hf-footer-label {
  position: absolute;
  bottom: 50px;
  right: 80px;
  font-family: "Inter", sans-serif;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.45);
}
</style>

<div class="hf-frame">
  <div class="hf-bracket tl"></div>
  <div class="hf-bracket tr"></div>
  <div class="hf-bracket bl"></div>
  <div class="hf-bracket br"></div>
  <div class="hf-footer-label">[BRAND / TAGLINE]</div>
</div>
