<!--
COMPONENT: card-grid-2
PURPOSE: 2 card side-by-side để compare/list 2 ý
PROPS:
  cards: array of {heading, subtitle?, body}
USAGE:
  <div class="hf-card-grid hf-grid-2">
    <div class="hf-card">
      <div class="hf-card-heading">End-to-end encrypted</div>
      <div class="hf-card-body">ảnh và video được mã hóa đầu cuối thay vì chỉ mã hóa khi lưu trên server.</div>
    </div>
    <div class="hf-card">...</div>
  </div>
GSAP:
  tl.from(".hf-card-grid .hf-card", { y: 30, opacity: 0, duration: 0.6, stagger: 0.15, ease: "power3.out" }, t);
-->
<style>
.hf-card-grid { display: grid; gap: 24px; width: 100%; max-width: 900px; margin: 0 auto; }
.hf-card-grid.hf-grid-2 { grid-template-columns: repeat(2, 1fr); }

.hf-card {
  background: rgba(10, 24, 32, 0.55);
  border: 1.5px solid rgba(58, 188, 188, 0.35);
  border-radius: 16px;
  padding: 28px 32px;
  box-shadow: 0 0 32px rgba(77, 204, 204, 0.18), inset 0 0 20px rgba(58, 188, 188, 0.06);
}
.hf-card-heading {
  font-family: "Inter", sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.3;
  margin-bottom: 8px;
}
.hf-card-subtitle {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #6db8b8;
  margin-bottom: 12px;
}
.hf-card-body {
  font-size: 22px;
  color: #a0c4c4;
  line-height: 1.5;
  font-weight: 500;
}
</style>

<div class="hf-card-grid hf-grid-2">
  <div class="hf-card">
    <div class="hf-card-heading">[Card 1 heading]</div>
    <div class="hf-card-body">[Card 1 body — 1-3 dòng mô tả ngắn]</div>
  </div>
  <div class="hf-card">
    <div class="hf-card-heading">[Card 2 heading]</div>
    <div class="hf-card-body">[Card 2 body]</div>
  </div>
</div>
